name: File a bug or enhancement
description: File a rabbit-workflow bug or enhancement. Feature and priority are required so the issue is actionable by rabbit's automation.
title: "<short summary>"
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. Pick a **feature** scope and a **priority** below —
        both are required. A submitted form is auto-labeled `feature:<x>` and
        `priority:<y>` so rabbit's automation can act on it, mirroring the
        enforcement `file-item.py` applies to bot/loop filings.
  - type: dropdown
    id: feature
    attributes:
      label: Feature
      description: Which feature scope does this issue belong to?
      options:
        - contract
        - rabbit-auto-evolve
        - rabbit-cage
        - rabbit-decompose
        - rabbit-feature
        - rabbit-housekeep
        - rabbit-issue
        - rabbit-meta
        - rabbit-spec
        - tdd-subagent
        - policy
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this?
      options:
        - low
        - medium
        - high
        - critical
    validations:
      required: true
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug or enhancement.
      placeholder: e.g. "list-items.py drops the priority filter when --status all is passed"
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: What happened, what you expected, and (for a bug) steps to reproduce.
    validations:
      required: true
